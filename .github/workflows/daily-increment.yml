name: Daily Number Incrementer

on:
  schedule:
    - cron: "0 7 * * *"   # 12:00 PM Pakistan time daily
  workflow_dispatch: {}    # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        run: |
          git config user.name "mr-taha-saqib"
          git config user.email "tahasaqib24@gmail.com"

      - name: Run incrementer
        run: python update_number.py
